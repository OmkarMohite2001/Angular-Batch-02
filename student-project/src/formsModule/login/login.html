<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-5 shadow-lg">
        <h2 class="text-center mb-4">Login</h2>
        <form #f="ngForm" (ngSubmit)="onSubmit(f)">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" [(ngModel)]="user.username" class="form-control" required minlength="3" #usernameCtrl="ngModel">
                @if(usernameCtrl.invalid && usernameCtrl.touched){
                <div class="text-danger mt-1">Username must be at least 3 characters</div>
                }
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="user.email" class="form-control" required #emailCtrl="ngModel">
                @if(emailCtrl.invalid && emailCtrl.touched){
                <div class="text-danger mt-1">Please enter a valid email</div>
                }
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="user.password" class="form-control" required #passwordCtrl="ngModel">
                @if(passwordCtrl.invalid && passwordCtrl.touched){
                <div class="text-danger mt-1">Password is required</div>
                }
            </div>
            <div class="d-grid">
                <button class="btn btn-primary" type="submit" [disabled]="f.invalid">Login</button>
            </div>
        </form>
    </div>
</div>
