<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h3>{{editindex === -1 ? 'Add Student':'Update Student'}}</h3>
                <form #f="ngForm" (ngSubmit)="onSubmit(f)">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter Name" class="form-control"
                            [(ngModel)]="student.name" />
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter Email" class="form-control"
                            [(ngModel)]="student.email" />
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" id="age" name="age" placeholder="Enter Age" class="form-control"
                            [(ngModel)]="student.age" />
                    </div>
                    <div class="mb-3">
                        <label for="course" class="form-label">Course</label>
                        <input type="text" id="course" name="course" placeholder="Enter Course" class="form-control"
                            [(ngModel)]="student.course" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{editindex === -1 ?'Add Student':'Update
                        Student'}}</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 shadow">
                <h2>Student List</h2>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Course</th>
                                <th>Age</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for(s of students;let i = $index;track s){
                            <tr>
                                <td>{{s.name}}</td>
                                <td>{{s.email}}</td>
                                <td>{{s.age}}</td>
                                <td>{{s.course}}</td>
                                <td>
                                    <button class="btn btn-warning btn-sm me-2" (click)="editStudent(s,i)">Edit</button>
                                    <button class="btn btn-danger btn-sm" (click)="deleteStudent(i)">Delete</button>
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
