<form #f="ngForm" (ngSubmit)="onSubmit(f)">
  
<div class="container mt-5 ">
  <h2 class="text-center mb-5">Login Form</h2>
  <div class="card p-5 shadow">
    <div class="mb-4">
      <label class="form-label m-2">UserName</label>
      <input type="text" name="username" [(ngModel)]="user.username"  class="form-control" minlength="3" #usernameCtrl="ngModel">
      @if(usernameCtrl.invalid && usernameCtrl.touched){
        <div class="text-danger" >Username Must be At least 3 Characters</div>
      }
    </div>

     <div class="mb-4">
      <label class="form-label m-2">Email</label>
      <input type="email"name="email" [(ngModel)]="user.email" class="form-control" #emailCtrl="ngModel" required>
        @if(emailCtrl.invalid && emailCtrl.touched){
        <div class="text-danger" >Invalid Email</div>
      }
    </div>

     <div class="mb-4">
      <label class="form-label m-2">Password</label>
      <input type="password"name="password" [(ngModel)]="user.password" class="form-control"  #passwordCtrl="ngModel">
        @if(passwordCtrl.invalid && passwordCtrl.touched){
        <div class="text-danger" >Username Must be At least 3 Characters</div>
      }
    </div>

    <button class="btn btn-primary w-200" type="submit">Login</button>
  </div>
</div>
</form>
